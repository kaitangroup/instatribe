name: Build & Deploy to DigitalOcean

# Triggers on push to main (production) or pull_request (CI checks only)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build & Lint (runs on every push + PR)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/ci_db  # dummy — build doesn't need real DB
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy to DigitalOcean (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SSH into the droplet and run the update script
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}      # Droplet IP or domain
          username: ${{ secrets.DROPLET_USER }}      # e.g. kindred
          key:      ${{ secrets.DROPLET_SSH_KEY }}   # Private key (RSA/Ed25519)
          port:     ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            set -e
            cd /var/www/kindred
            bash scripts/update.sh

      - name: Notify success
        if: success()
        run: echo "✅ Deployed to ${{ secrets.DROPLET_HOST }} successfully."

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check the SSH step logs above."
